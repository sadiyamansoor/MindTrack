name: mindtrack
description: MindTrack – Mood & Study Balance App for students.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local key-value storage (no backend needed)
  shared_preferences: ^2.2.2

  # Beautiful chart library for mood pie chart
  fl_chart: ^0.68.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true